<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Samadhan Axom</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  color:#0b57d0;
}

#chat{
  height:350px;
  background:#fff;
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  overflow-y:auto;
  margin-bottom:10px;
}

#msg{
  width:70%;
  padding:10px;
  font-size:16px;
}

button{
  padding:10px 15px;
  font-size:16px;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
}
</style>
</head>

<body>

<h1>🤖 AI Samadhan Axom</h1>

<div id="chat">
<b>AI:</b> Namaste! Main AI Samadhan Axom hoon.<br><br>
</div>

<input type="text" id="msg" placeholder="Apna message likhiye...">
<button id="sendBtn" onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {

  const input = document.getElementById("msg");
  const button = document.getElementById("sendBtn");
  const chat = document.getElementById("chat");

  const message = input.value.trim();
  if (!message) return;

  chat.innerHTML += "<b>You:</b> " + message + "<br>";
  input.value = "";
  button.disabled = true;

  try {

    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await response.json();

    if (data.reply) {
      chat.innerHTML += "<b>AI:</b> " + data.reply + "<br><br>";
    } else if (data.error) {
      chat.innerHTML += "<b>AI Error:</b> " + JSON.stringify(data.error) + "<br><br>";
    } else {
      chat.innerHTML += "<b>AI:</b> Unexpected response.<br><br>";
    }

  } catch (err) {

    chat.innerHTML += "<b>AI:</b> Server se connect nahi ho paaya.<br><br>";

  }

  button.disabled = false;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
