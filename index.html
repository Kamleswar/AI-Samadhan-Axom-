<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Samadhan Axom</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:700px;
    margin:20px auto;
    padding:15px;
}

h1{
    text-align:center;
    color:#0b57d0;
}

#chat{
    height:420px;
    background:#fff;
    border-radius:10px;
    border:1px solid #ddd;
    overflow-y:auto;
    padding:15px;
}

.user{
    text-align:right;
    margin:8px 0;
}

.ai{
    text-align:left;
    margin:8px 0;
}

.user span{
    display:inline-block;
    background:#0b57d0;
    color:white;
    padding:10px;
    border-radius:12px;
}

.ai span{
    display:inline-block;
    background:#ececec;
    padding:10px;
    border-radius:12px;
}

.bottom{
    display:flex;
    gap:10px;
    margin-top:10px;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 20px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">

<h1>🤖 AI Samadhan Axom</h1>

<div id="chat">
<div class="ai">
<span>🙏 Namaste! Main AI Samadhan Axom hoon. Aap kya poochna chahte hain?</span>
</div>
</div>

<div class="bottom">
<input id="msg" placeholder="Apna message likhiye...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

async function sendMessage(){

const input=document.getElementById("msg");
const chat=document.getElementById("chat");

const message=input.value.trim();

if(!message) return;

chat.innerHTML+=`<div class="user"><span>${message}</span></div>`;

input.value="";

try{

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message})
});

const data=await res.json();

chat.innerHTML+=`<div class="ai"><span>${data.reply}</span></div>`;

}catch(e){

chat.innerHTML+=`<div class="ai"><span>⚠️ Server se connect nahi ho paaya.</span></div>`;

}

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
