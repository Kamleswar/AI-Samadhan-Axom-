<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Samadhan Axom</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:450px;
background:#fff;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
overflow:hidden;
}

.header{
background:#0b57d0;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#chat{
height:400px;
overflow-y:auto;
padding:15px;
background:#fafafa;
}

.message{
margin:10px 0;
padding:10px;
border-radius:10px;
}

.user{
background:#d8ecff;
text-align:right;
}

.ai{
background:#eeeeee;
text-align:left;
}

.input-area{
display:flex;
padding:10px;
gap:8px;
}

#msg{
flex:1;
padding:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
background:#0b57d0;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0847a8;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
🤖 AI Samadhan Axom
</div>

<div id="chat">
<div class="message ai">
Namaste! Main AI Samadhan Axom hoon. 👋
</div>
</div>

<div class="input-area">
<input type="text" id="msg" placeholder="Apna message likhiye...">
<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

<script>

// JavaScript hum Part 2 me add karenge.

</script>

</div>

</body>
</html>
